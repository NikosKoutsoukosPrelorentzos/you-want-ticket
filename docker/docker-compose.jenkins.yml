services:
  jenkins:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jenkins

    container_name: you-want-ticket-jenkins
    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

volumes:
  jenkins_home: